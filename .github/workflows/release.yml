name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        run: |
          current="${{ steps.latest.outputs.tag }}"
          major=$(echo "$current" | sed 's/v//' | cut -d. -f1)
          minor=$(echo "$current" | sed 's/v//' | cut -d. -f2)
          patch=$(echo "$current" | sed 's/v//' | cut -d. -f3)

          # feat: = minor bump, everything else = patch bump
          msg=$(git log -1 --pretty=%s)
          if echo "$msg" | grep -q "^feat"; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          new="v${major}.${minor}.${patch}"
          echo "version=$new" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag "${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.version }}"

  build:
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-s -w -X main.Version=${{ needs.tag.outputs.version }}" -o bay .

      - name: Package
        run: tar -czf bay-${{ needs.tag.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz bay

      - uses: actions/upload-artifact@v4
        with:
          name: bay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bay-*.tar.gz

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum bay-*.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/bay-*.tar.gz
            artifacts/checksums.txt
